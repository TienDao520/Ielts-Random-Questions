    const part = btn.dataset.part;

    btn.style.color = 'white';
    btn.style.fontWeight = 'bold';

    // Set active question pool
    if (part === '1') {
      currentQuestionPool = part1Questions;
    } else if (part === '2') {
      currentQuestionPool = part2Questions;
    } else if (part === '3') {
      currentQuestionPool = part3Questions;
    } else if (part === 'all') {
      currentQuestionPool = allQuestions;
    }

    // Optional: give visual feedback that selection changed
    // You can also show current part name somewhere if you want
  });
});

// ────────────────────────────────────────────────
// Show random question from CURRENT pool
// ────────────────────────────────────────────────
function showRandomQuestion() {
  if (currentQuestionPool.length === 0) {
    document.getElementById("question").innerHTML = "No questions available.";
    return;
  }

  const randomIndex = Math.floor(Math.random() * currentQuestionPool.length);
  const item = currentQuestionPool[randomIndex];

  document.getElementById("category").textContent = item.category || "";
  document.getElementById("type").textContent = item.type || "";

  let html = item.question;

  if (item.type === "Part 2") {
    html = html
      .replace(/\. You should say:/, '.<br><br><strong>You should say:</strong><br>')
      .replace(/, (?=[A-Z])/g, ',<br>')
      .replace(/, and explain /g, '.<br>and explain ');
  }

  document.getElementById("question").innerHTML = html;
  document.getElementById("question").classList.remove("empty");
}
// Make sure first click works even if no part was selected yet
document.getElementById("controls").querySelector("button").addEventListener("click", showRandomQuestion);

// Optional: show one question immediately when page loads
// showRandomQuestion();
</script>
